version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: obc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openbusinesschat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: obc_app
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/openbusinesschat
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
